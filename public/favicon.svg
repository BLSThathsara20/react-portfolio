<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Savindu Thathsara">
  <defs>
    <linearGradient id="mesh" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121513"/>
      <stop offset="1" stop-color="#0A0C0B"/>
    </linearGradient>
    <linearGradient id="signal" x1="14" y1="18" x2="50" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8F542"/>
      <stop offset="1" stop-color="#8FB01E"/>
    </linearGradient>
  </defs>

  <!-- Soft tile -->
  <rect width="64" height="64" rx="16" fill="url(#mesh)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" stroke="rgba(200,245,66,0.22)" stroke-width="1" fill="none"/>

  <!-- Signal edges (ML pipeline arc reading as S) -->
  <path
    d="M18 20 C28 14, 36 16, 40 22 C44 28, 36 34, 28 36 C20 38, 16 44, 22 50 C28 56, 42 52, 48 44"
    stroke="url(#signal)"
    stroke-width="2.4"
    stroke-linecap="round"
    fill="none"
    opacity="0.85"
  />

  <!-- Nodes -->
  <circle cx="18" cy="20" r="3.2" fill="#C8F542"/>
  <circle cx="40" cy="22" r="2.6" fill="#C8F542" opacity="0.9"/>
  <circle cx="28" cy="36" r="3.6" fill="#C8F542"/>
  <circle cx="22" cy="50" r="2.4" fill="#C8F542" opacity="0.85"/>
  <circle cx="48" cy="44" r="3.2" fill="#C8F542"/>

  <!-- Brand underscore pulse -->
  <rect x="22" y="56" width="20" height="2.5" rx="1.25" fill="#C8F542"/>
</svg>

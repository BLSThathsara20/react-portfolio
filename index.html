    <!-- LCP fonts: self-hosted, preload only weights used above the fold -->
    <link
      rel="preload"
      href="/fonts/dm-sans-400.woff2"
      as="font"
      type="font/woff2"

    <link

    <!-- Critical CSS: paints hero LCP before JS/CSS bundles -->
    <style>
      @font-face {
        font-family: 'DM Sans';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/dm-sans-400.woff2') format('woff2');
      }
      @font-face {
        font-family: Syne;
        font-style: normal;
        font-weight: 800;
        font-display: swap;
        src: url('/fonts/syne-800.woff2') format('woff2');
      }
      :root {
        --surface: #0a0c0b;
        --ink: #f2f5f0;
        --ink-soft: rgba(242, 245, 240, 0.72);
        --accent: #c8f542;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--surface);
        color: var(--ink);
        font-family: 'DM Sans', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      #root {
        min-height: 100vh;
      }
      .boot-shell {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 7rem 1rem 3.5rem;
        background:
          radial-gradient(ellipse 70% 55% at 15% 20%, rgba(200, 245, 66, 0.14), transparent 55%),
          radial-gradient(ellipse 55% 45% at 85% 10%, rgba(90, 220, 200, 0.07), transparent 50%),
          var(--surface);
      }
      .boot-shell__inner {
        width: 100%;
        max-width: 80rem;
        margin: 0 auto;
        padding: 0 0.5rem;
      }
      .boot-shell__label {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0 0 1.75rem;
        padding: 0.375rem 0.75rem;
        border: 1px solid rgba(200, 245, 66, 0.3);
        border-radius: 999px;
        background: rgba(200, 245, 66, 0.1);
        color: var(--accent);
        font-family: ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .boot-shell h1 {
        margin: 0 0 1.25rem;
        font-family: Syne, system-ui, sans-serif;
        font-weight: 800;
        font-size: clamp(2.75rem, 10vw, 6rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }
      .boot-shell h1 span {
        display: block;
      }
      .boot-shell__soft {
        color: var(--ink-soft);
      }
      .boot-shell__accent {
        color: var(--accent);
      }
      .boot-shell__headline {
        margin: 0 0 1.25rem;
        max-width: 42rem;
        font-family: Syne, system-ui, sans-serif;
        font-weight: 600;
        font-size: clamp(1.5rem, 4vw, 2.25rem);
        line-height: 1.15;
        letter-spacing: -0.03em;
      }
      .boot-shell__bio {
        margin: 0 0 2.25rem;
        max-width: 36rem;
        color: var(--ink-soft);
        font-size: 1.125rem;
        line-height: 1.65;
      }
      .boot-shell__cta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .boot-shell__btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.875rem 1.5rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
      }
      .boot-shell__btn--primary {
        background: var(--accent);
        color: var(--surface);
      }
      .boot-shell__btn--secondary {
        border: 1px solid rgba(242, 245, 240, 0.12);
        color: var(--ink);
        background: rgba(255, 255, 255, 0.03);
      }
    </style>
